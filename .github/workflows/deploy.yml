name: Deploy Blind Guidance to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VPS_IP: ${{ secrets.VPS_IP }}
      VPS_USER: ${{ secrets.VPS_USER }}
      VPS_PASSWORD: ${{ secrets.VPS_PASSWORD }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install sshpass
        run: sudo apt-get update && sudo apt-get install -y sshpass

      - name: Upload files to VPS
        run: |
          set -euo pipefail
          sshpass -p "$VPS_PASSWORD" ssh -o StrictHostKeyChecking=no "$VPS_USER@$VPS_IP" \
            "mkdir -p ~/blind-guidance/backend ~/blind-guidance/frontend"

          sshpass -p "$VPS_PASSWORD" scp -o StrictHostKeyChecking=no -r \
            ./backend/* \
            "$VPS_USER@$VPS_IP:~/blind-guidance/backend/"

          sshpass -p "$VPS_PASSWORD" scp -o StrictHostKeyChecking=no -r \
            ./frontend/* \
            "$VPS_USER@$VPS_IP:~/blind-guidance/frontend/"

          sshpass -p "$VPS_PASSWORD" scp -o StrictHostKeyChecking=no \
            ./nginx.conf ./blind-guidance.service \
            "$VPS_USER@$VPS_IP:~/blind-guidance/"

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            set -e

            echo "📦 Install Node dependencies..."
            cd ~/blind-guidance/backend
            npm install --omit=dev

            echo "🔧 Configure Nginx..."
            sudo cp ~/blind-guidance/nginx.conf /etc/nginx/sites-available/blind-guidance-8443
            sudo rm -f /etc/nginx/sites-enabled/blind-guidance-6000
            sudo ln -sf /etc/nginx/sites-available/blind-guidance-8443 /etc/nginx/sites-enabled/blind-guidance-8443
            sudo nginx -t
            sudo systemctl reload nginx

            echo "🔧 Configure systemd service..."
            sudo cp ~/blind-guidance/blind-guidance.service /etc/systemd/system/blind-guidance.service
            sudo systemctl daemon-reload
            sudo systemctl enable blind-guidance
            sudo systemctl restart blind-guidance
            sleep 2
            sudo systemctl status blind-guidance --no-pager

            echo "🧪 Smoke tests..."
            curl -sf http://127.0.0.1:6000/ -o /dev/null && echo "✅ Frontend OK on :6000" || echo "⚠️ Frontend not yet ready"
            echo "✅ Deployment complete!"
